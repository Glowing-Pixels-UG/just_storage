# Clippy configuration for just_storage
# Based on 2025 best practices for Rust static analysis

# Set the MSRV (Minimum Supported Rust Version).
# Pinned to 1.96 to match rust-toolchain.toml, the Dockerfile builder, and CI.
# (The hard floor is 1.94, required by sqlx 0.9.)
msrv = "1.96.0"

# Allow certain lints that are too strict for this project
allow-private-module-inception = true

# Configure specific thresholds
cognitive-complexity-threshold = 25
array-size-threshold = 512