apiVersion: v1
kind: Secret
metadata:
  name: just-storage-secrets
  namespace: just-storage
type: Opaque
stringData:
  # Database connection string
  # Format: postgresql://user:password@host:port/database
  # Using infra-postgres-rw service in data namespace
  # Password is URL-encoded (contains special characters)
  database-url: "postgresql://just_storage:***REMOVED-DB-PASSWORD***@infra-postgres-rw.data:5432/just_storage"
  
  # JWT secret for authentication (REQUIRED)
  jwt-secret: "***REMOVED-JWT-SECRET***"
  
  # Optional: API keys (comma-separated)
  # If not provided, only JWT authentication will be available
  # Format: "key1,key2,key3"
  # Current keys:
  #   - Default key: ***REMOVED-API-KEY***
  #   - Scanner service: ***REMOVED-API-KEY***
  api-keys: "***REMOVED-API-KEY***,***REMOVED-API-KEY***"

