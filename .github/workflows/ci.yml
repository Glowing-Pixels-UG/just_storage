name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ "*" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Check compilation
        working-directory: rust
        env:
          SQLX_OFFLINE: "true"
        run: cargo check

  docker-image:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: image-tags
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}"
          image="$(printf '%s' "$image" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(git rev-parse --short=12 HEAD)"
          release_tag=""
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME#v}"
          elif [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/}" ]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            release_tag="${release_tag#v}"
          fi
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            if [ -n "$release_tag" ]; then
              echo "${image}:${release_tag}"
            elif [ "${GITHUB_REF_NAME:-}" = "main" ] || [ "${GITHUB_REF_NAME:-}" = "master" ]; then
              echo "${image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
