name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ "*" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ---- Format + lint gate ----
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: rustfmt
        working-directory: rust
        run: cargo fmt --all -- --check
      - name: clippy (all targets, warnings denied)
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ---- Tests ----
  # Unit + doc tests need no services. Integration/e2e/property tests use
  # testcontainers + a mock OIDC server, which require the runner's Docker
  # daemon (present on ubuntu-latest). The timing-sensitive performance guards
  # (tests/performance*.rs) are intentionally excluded from the gate.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: unit + doc tests
        working-directory: rust
        run: cargo test --locked --lib --bins --doc
      - name: integration + e2e + property tests
        working-directory: rust
        run: cargo test --locked --test integration --test e2e --test property

  # ---- Dependency / advisory / license gate ----
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust/Cargo.toml
          command: check

  # ---- Multi-arch image (publishes on non-PR events) ----
  docker-image:
    needs: [ lint, test, deny ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: image-tags
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}"
          image="$(printf '%s' "$image" | tr '[:upper:]' '[:lower:]')"
          short_sha="$(git rev-parse --short=12 HEAD)"
          release_tag=""
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME#v}"
          elif [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/}" ]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            release_tag="${release_tag#v}"
          fi
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:sha-${short_sha}"
            if [ -n "$release_tag" ]; then
              echo "${image}:${release_tag}"
            elif [ "${GITHUB_REF_NAME:-}" = "main" ] || [ "${GITHUB_REF_NAME:-}" = "master" ]; then
              echo "${image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
