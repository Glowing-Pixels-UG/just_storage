name: Docker Build

on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: registry.bk.glpx.pro
  IMAGE: registry.bk.glpx.pro/just-storage/just-storage

jobs:
  docker-pr:
    if: github.event_name == 'pull_request'
    runs-on: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          allow: network.host
          network: host
          push: false
          tags: ${{ env.IMAGE }}:pr-${{ github.sha }}

  docker-amd64:
    if: github.event_name != 'pull_request'
    runs-on: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Check registry credentials
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ]; then
            echo "::error::Missing REGISTRY_USERNAME/REGISTRY_PASSWORD repository Actions secrets for ${IMAGE}."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: image-tags
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          release_tag=""
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME#v}"
          elif [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/}" ]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            release_tag="${release_tag#v}"
          fi
          echo "sha_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${short_sha}-amd64"
            if [ -n "$release_tag" ]; then
              echo "${IMAGE}:${release_tag}-amd64"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$release_tag" ]; then
            echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          allow: network.host
          network: host
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-amd64
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-amd64,mode=max

  docker-arm64:
    if: github.event_name != 'pull_request'
    runs-on: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Check registry credentials
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ]; then
            echo "::error::Missing REGISTRY_USERNAME/REGISTRY_PASSWORD repository Actions secrets for ${IMAGE}."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: image-tags
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          release_tag=""
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME#v}"
          elif [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/}" ]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            release_tag="${release_tag#v}"
          fi
          echo "sha_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${short_sha}-arm64"
            if [ -n "$release_tag" ]; then
              echo "${IMAGE}:${release_tag}-arm64"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$release_tag" ]; then
            echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          allow: network.host
          network: host
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-arm64,mode=max

  docker-manifest:
    if: github.event_name != 'pull_request'
    needs: [docker-amd64, docker-arm64]
    runs-on: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Check registry credentials
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ]; then
            echo "::error::Missing REGISTRY_USERNAME/REGISTRY_PASSWORD repository Actions secrets for ${IMAGE}."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: image-tags
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          release_tag=""
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME#v}"
          elif [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/}" ]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            release_tag="${release_tag#v}"
          fi
          echo "sha_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          if [ -n "$release_tag" ]; then
            echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish multi-arch manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ steps.image-tags.outputs.sha_tag }}" \
            "${IMAGE}:${{ steps.image-tags.outputs.sha_tag }}-amd64" \
            "${IMAGE}:${{ steps.image-tags.outputs.sha_tag }}-arm64"

          if [ -n "${{ steps.image-tags.outputs.release_tag }}" ]; then
            docker buildx imagetools create \
              --tag "${IMAGE}:${{ steps.image-tags.outputs.release_tag }}" \
              "${IMAGE}:${{ steps.image-tags.outputs.release_tag }}-amd64" \
              "${IMAGE}:${{ steps.image-tags.outputs.release_tag }}-arm64"
          fi
