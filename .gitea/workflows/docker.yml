name: Docker Build

on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: registry.bk.glpx.pro
  IMAGE: registry.bk.glpx.pro/just-storage/just-storage

jobs:
  docker:
    runs-on: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Check registry credentials
        if: github.event_name != 'pull_request'
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ]; then
            echo "::error::Missing REGISTRY_USERNAME/REGISTRY_PASSWORD repository Actions secrets for ${IMAGE}."
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: image-tags
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          release_tag=""
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME#v}"
          elif [ "${GITHUB_REF:-}" != "${GITHUB_REF#refs/tags/}" ]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            release_tag="${release_tag#v}"
          fi
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${short_sha}"
            if [ -n "$release_tag" ]; then
              echo "${IMAGE}:${release_tag}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          allow: network.host
          network: host
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max
